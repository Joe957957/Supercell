<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supercell Store - 伺服器維護中</title>
    <style>
        /* 1. 全螢幕背景圖設定 */
        body { 
            margin: 0; padding: 0; font-family: 'Arial', sans-serif; 
            background-image: url('./images/back.jpg'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #1a1a1a; overflow: hidden; display: flex; flex-direction: column; height: 100vh; 
            position: relative;
        }
        
        .bg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.45); z-index: 0; }

        /* 2. 導覽列 */
        .navbar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 50px; background-color: #ffffff; box-shadow: 0 2px 15px rgba(0,0,0,0.2); 
            z-index: 100; position: relative;
        }
        .nav-left { display: flex; height: 45px; cursor: pointer; align-items: center; }
        
        .logo-supercell { 
            color: #000000; font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 20px; line-height: 0.85; letter-spacing: 1.0px; 
            display: flex; flex-direction: column; align-items: flex-start;
        }
        .logo-supercell div { margin: 0; } 
        
        .logo-store { 
            background-color: #ffb800; color: #ffffff; font-family: 'Arial Black', 'Impact', sans-serif; 
            font-weight: 900; font-size: 20px; padding: 4px 18px; margin-left: 15px; 
            border-radius: 8px; transform: skewX(-10deg); display: flex; align-items: center; 
        }
        .logo-store span { transform: skewX(10deg); }
        
        .nav-right .login-btn { 
            background-color: #000000; color: #ffffff; padding: 10px 22px; border-radius: 30px; 
            font-weight: bold; font-size: 14px; cursor: pointer; display: flex; align-items: center; 
        }
        .id-badge { background-color: #ffffff; color: #000000; font-size: 12px; font-weight: 900; padding: 2px 6px; border-radius: 4px; margin-left: 8px; }
        
        /* 3. 中間主要內容區 */
        .main-content { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; z-index: 10; }
        
        /* 遊戲角色圖片 */
        .game-character { position: absolute; z-index: 1; filter: drop-shadow(0 15px 20px rgba(0,0,0,0.4)); }
        .char-king { width: 220px; left: 15%; top: 25%; animation: float 4s ease-in-out infinite; }
        .char-spike { width: 280px; right: 12%; top: 50%; margin-top: -140px; animation: float 3s ease-in-out infinite 1s; }

        /* 🔥 修改 1：維護卡片固定大小 🔥 */
        .container { 
            text-align: center; 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            padding: 50px 60px; border-radius: 30px; 
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4); z-index: 10; 
            border: 4px solid rgba(255, 255, 255, 0.5); 
            background-image: linear-gradient(0deg, #f0f0f0 1px, transparent 1px), linear-gradient(90deg, #f0f0f0 1px, transparent 1px);
            background-size: 20px 20px;
            
            /* 加入這兩行固定長寬，就不會跟著文字變形了 */
            width: 420px; 
            height: 480px; 
            box-sizing: border-box;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        h1 { font-size: 2.3rem; margin: 0 0 10px 0; font-weight: 900; color: #000;}
        
        /* 🔥 限制文字區塊的高度，讓下面的按鈕不會亂動 🔥 */
        .message-wrapper { height: 60px; display: flex; align-items: center; justify-content: center; margin-top: 15px; }
        .message { font-size: 1.3rem; font-weight: bold; color: #333; transition: opacity 0.3s ease; }
        
        /* UNO 反轉卡 */
        .uno-reverse-card {
            width: 110px; height: auto;
            margin: 15px 0; display: block;
            filter: drop-shadow(0 15px 20px rgba(0,255,0,0.3)); 
            animation: reverse-spin 3s linear infinite; 
        }
        
        /* 按鈕 */
        .btn-retry { margin-top: 20px; padding: 15px 45px; font-size: 1.2rem; font-weight: 900; color: #ffffff; background-color: #0055ff; border: none; border-radius: 40px; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 6px 0 #0033cc; position: relative; top: 0; }
        .btn-retry:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(0,85,255,0.4), 0 6px 0 #0033cc; }
        .btn-retry:active { top: 4px; box-shadow: 0 2px 0 #0033cc; }

        /* 動畫區 */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes reverse-spin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(-180deg) scale(1.1); } 
            100% { transform: rotate(-360deg) scale(1); }
        }

        /* 🔥 修改 2：正中央彈出的史派克視窗 🔥 */
        .spike-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            /* 預設縮小到 0 (看不見)，且置中對齊 */
            transform: translate(-50%, -50%) scale(0); 
            z-index: 9999; /* 確保在最上層 */
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 加入超 Q 彈的放大動畫 */
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            pointer-events: none; /* 讓它不會擋住滑鼠點擊後面的東西 */
        }
        
        /* 當加上 .show 這個 class 時，史派克就會放大到正常比例 */
        .spike-popup.show {
            transform: translate(-50%, -50%) scale(1.2); /* 稍微放大 1.2 倍更有魄力 */
        }
        
        .spike-popup img {
            width: 280px;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.8));
        }
        
        /* 說話氣泡 */
        .speech-bubble {
            background: #ffffff; border: 4px solid #000000; border-radius: 20px;
            padding: 15px 25px; font-weight: 900; font-size: 20px; color: #000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); position: relative;
            margin-bottom: 10px; animation: float 2s infinite ease-in-out; text-align: center;
        }
        /* 氣泡的小尾巴 */
        .speech-bubble::after {
            content: ''; position: absolute; bottom: -12px; left: 50%; margin-left: -10px;
            border-width: 12px 10px 0; border-style: solid; border-color: #fff transparent transparent transparent; z-index: 2;
        }
        .speech-bubble::before {
            content: ''; position: absolute; bottom: -17px; left: 50%; margin-left: -13px;
            border-width: 15px 13px 0; border-style: solid; border-color: #000 transparent transparent transparent; z-index: 1;
        }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>

    <header class="navbar">
        <div class="nav-left">
            <div class="logo-supercell">
                <div>SUP</div>
                <div>ERC</div>
                <div>ELL</div>
            </div>
            <div class="logo-store"><span>STORE</span></div>
        </div>
        <div class="nav-right">
            <div class="login-btn">登入 <span class="id-badge">ID</span></div>
        </div>
    </header>

    <div id="spike-popup" class="spike-popup">
        <div class="speech-bubble">還沒修好啦！<br>一直按重新整理也沒用喔🌵</div>
        <img src="./images/spike.gif" alt="彈出的史派克">
    </div>

    <div class="main-content">
        <img src="./images/king.png" alt="問號國王" class="game-character char-king">
        <img src="./images/spike1.gif" alt="攤手斯派克" class="game-character char-spike">
        
        <div class="container">
            <h1>伺服器維護中</h1>
            
            <img src="./images/reverse.png" alt="UNO 反轉卡" class="uno-reverse-card">
            
            <div class="message-wrapper">
                <div class="message" id="dynamic-text">國王對伺服器打出了一張反轉卡！</div>
            </div>
            
            <button class="btn-retry" onclick="checkConnection()">重新連線</button>
        </div>
    </div>

    <script>
        const messages = [
            "國王對伺服器打出了一張反轉卡！",
            "正在把當機狀態反彈給哥布林...",
            "斯派克表示他什麼都不知道 ¯\\_(ツ)_/¯",
            "正在用聖水修復網路連線...",
            "快好了！國王已經重新洗牌了..."
        ];
        
        let messageIndex = 0;
        const textElement = document.getElementById('dynamic-text');
        
        // 控制文字輪播
        setInterval(() => {
            messageIndex = (messageIndex + 1) % messages.length;
            textElement.style.opacity = 0;
            setTimeout(() => {
                textElement.innerText = messages[messageIndex];
                textElement.style.opacity = 1;
            }, 300);
        }, 3500);

        // 🔥 修改：按下重新連線按鈕的邏輯 🔥
        function checkConnection() {
            const btn = document.querySelector('.btn-retry');
            const popup = document.getElementById('spike-popup');
            
            // 如果史派克已經在畫面上了，就不要重複觸發
            if (popup.classList.contains('show')) return;

            // 1. 按鈕變成連線中狀態
            btn.innerText = "連線嘗試中...";
            btn.style.backgroundColor = "#0033aa";
            btn.style.pointerEvents = "none"; // 暫時不能點擊
            
            // 2. 模擬等待 1 秒後，史派克跳出來！
            setTimeout(() => {
                // 按鈕恢復原狀
                btn.innerText = "重新連線";
                btn.style.backgroundColor = "#0055ff";
                btn.style.pointerEvents = "auto";
                
                // 史派克從正中間「砰！」彈出來
                popup.classList.add('show');
                
                // 3. 停留 3.5 秒後，史派克自己縮回去
                setTimeout(() => {
                    popup.classList.remove('show');
                }, 3500);
                
            }, 1000);
        }
    </script>
</body>
</html>
