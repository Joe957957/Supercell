<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supercell Store - 伺服器維護中</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Arial', sans-serif; background-color: #f7f8fa; background-image: linear-gradient(45deg, #e1e4e9 25%, transparent 25%), linear-gradient(-45deg, #e1e4e9 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e1e4e9 75%), linear-gradient(-45deg, transparent 75%, #e1e4e9 75%); background-size: 40px 40px; background-position: 0 0, 0 20px, 20px 20px, 20px 0; color: #1a1a1a; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 12px 50px; background-color: #ffffff; box-shadow: 0 2px 15px rgba(0,0,0,0.08); z-index: 100; }
        .nav-left { display: flex; height: 38px; cursor: pointer; align-items: center; }
        .logo-supercell { color: #000000; font-family: 'Impact', 'Arial Black', sans-serif; font-size: 16px; line-height: 0.85; letter-spacing: 0.5px; display: flex; flex-direction: column; justify-content: center; }
        .logo-store { background-color: #ffc107; color: #ffffff; font-family: 'Arial Black', 'Impact', sans-serif; font-weight: 900; font-size: 18px; padding: 2px 18px; margin-left: 12px; border-radius: 8px; transform: skewX(-12deg); display: flex; align-items: center; }
        .logo-store span { transform: skewX(12deg); }
        .nav-right .login-btn { background-color: #000000; color: #ffffff; padding: 8px 20px; border-radius: 30px; font-weight: bold; font-size: 14px; cursor: pointer; display: flex; align-items: center; }
        .id-badge { background-color: #ffffff; color: #000000; font-size: 10px; font-weight: 900; padding: 2px 5px; border-radius: 4px; margin-left: 8px; }
        
        .main-content { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        
        /* 新增：遊戲角色圖片的定位 */
        .game-character { position: absolute; z-index: 1; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2)); }
        .char-king { width: 220px; left: 15%; top: 25%; }
        .char-spike { width: 180px; right: 15%; bottom: 20%; }

        .container { text-align: center; background: #ffffff; padding: 50px 70px; border-radius: 24px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12); z-index: 10; border: 4px solid #eaeaea; }
        h1 { font-size: 2.2rem; margin-bottom: 10px; font-weight: 900;}
        .message { font-size: 1.2rem; min-height: 35px; margin-top: 20px; font-weight: bold; color: #555; }
        .loading-animation { margin: 30px auto; width: 70px; height: 70px; background-color: #ffcc00; border-radius: 15px; border: 4px solid #e6b800; }
        .btn-retry { margin-top: 30px; padding: 12px 35px; font-size: 1.1rem; font-weight: 900; color: #ffffff; background-color: #0055ff; border: none; border-radius: 30px; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 0 #0033cc; position: relative; top: 0; }
        .btn-retry:hover { transform: scale(1.03); box-shadow: 0 6px 20px rgba(0,85,255,0.4), 0 4px 0 #0033cc; }
        .btn-retry:active { top: 3px; box-shadow: 0 1px 0 #0033cc; }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="nav-left">
            <div class="logo-supercell"><div>SUP</div><div>ERC</div><div>ELL</div></div>
            <div class="logo-store"><span>STORE</span></div>
        </div>
        <div class="nav-right">
            <div class="login-btn">登入 <span class="id-badge">ID</span></div>
        </div>
    </header>

    <div class="main-content">
        <img src="./images/king.png" alt="問號國王" class="game-character char-king">
        <img src="./images/spike.gif" alt="斯派克" class="game-character char-spike">
        
        <div class="container">
            <h1>伺服器正在維護中</h1>
            <div class="loading-animation"></div>
            <div class="message" id="dynamic-text">我們的建築工人正在加緊趕工...</div>
            <button class="btn-retry">重新連線</button>
        </div>
    </div>
</body>
</html>
